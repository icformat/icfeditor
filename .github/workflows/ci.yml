name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    name: typecheck · test · build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (main + preload + renderer)
        run: npm run build

  package:
    name: Package installers (${{ matrix.os }})
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    # `secrets` can't be used in a step `if:`, so resolve a boolean flag here at
    # the job level (where secrets ARE allowed) and key the steps off it.
    env:
      HAS_MAC_CERT: ${{ secrets.CSC_LINK != '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Unsigned build: Windows, Linux, and macOS when no signing secret is set.
      # CSC_LINK is NOT defined here — electron-builder treats a *defined* (even
      # empty) CSC_LINK as "sign me", so an empty string breaks the build. The
      # only way to stay unsigned is to leave the variable unset entirely.
      - name: Package (unsigned)
        if: ${{ runner.os != 'macOS' || env.HAS_MAC_CERT != 'true' }}
        run: npm run package
      # Signed + notarized macOS build, only when the secrets actually exist.
      # CSC_LINK is set ONLY in this branch, so it is never an empty string.
      - name: Package (macOS, signed)
        if: ${{ runner.os == 'macOS' && env.HAS_MAC_CERT == 'true' }}
        run: npm run package
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect installers and generate SHA-256 checksums
        run: |
          mkdir -p dist
          find artifacts -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} dist/ \;
          cd dist
          sha256sum * > SHA256SUMS.txt
          echo "Artifacts to publish:"; ls -la; echo; cat SHA256SUMS.txt
      - name: Attach installers to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
          append_body: true
          body: |
            ### Downloads

            Installers are **unsigned**. Verify your download against `SHA256SUMS.txt`
            (`sha256sum -c SHA256SUMS.txt` on Linux/macOS, `Get-FileHash` on Windows).

            - **Windows** — SmartScreen may show *"Windows protected your PC"*.
              Click **More info → Run anyway**. The installer is safe; the warning only
              means it isn't code-signed yet.
            - **macOS** — the build isn't notarized, so Gatekeeper will block a double-click.
              Right-click the app → **Open**, then confirm once.
            - **Linux** — `chmod +x *.AppImage` then run it, or install the `.deb`.
