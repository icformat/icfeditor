      The production Content-Security-Policy is injected at build time by the
      `inject-csp` plugin in electron.vite.config.ts. It is intentionally NOT set
      here, because a `script-src 'self'` meta blocks Vite's dev-only inline
      React-refresh preamble and leaves a blank page during `npm run dev`.
    -->
    <title>ICF Editor</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
