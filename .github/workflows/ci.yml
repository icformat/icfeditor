name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck · test · build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      # The editor depends on the sibling `icf.js` library via `file:../icf.js`,
      # so both repositories are checked out side by side and the library is
      # built first (its dist/ provides the ESM + type declarations).
      - name: Checkout editor
        uses: actions/checkout@v4
        with:
          path: icfeditor

      - name: Checkout icf.js
        uses: actions/checkout@v4
        with:
          repository: icformat/icf.js
          path: icf.js

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build icf.js
        working-directory: icf.js
        run: |
          npm ci
          npm run build

      - name: Install editor dependencies
        working-directory: icfeditor
        run: npm ci

      - name: Typecheck
        working-directory: icfeditor
        run: npm run typecheck

      - name: Unit tests
        working-directory: icfeditor
        run: npm test

      - name: Build (main + preload + renderer)
        working-directory: icfeditor
        run: npm run build

  package:
    name: Package installers
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout editor
        uses: actions/checkout@v4
        with:
          path: icfeditor
      - name: Checkout icf.js
        uses: actions/checkout@v4
        with:
          repository: icformat/icf.js
          path: icf.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build icf.js
        working-directory: icf.js
        run: npm ci && npm run build
      - name: Install editor dependencies
        working-directory: icfeditor
        run: npm ci
      - name: Package
        working-directory: icfeditor
        run: npm run package
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            icfeditor/release/*.exe
            icfeditor/release/*.dmg
            icfeditor/release/*.AppImage
            icfeditor/release/*.deb
          if-no-files-found: ignore
